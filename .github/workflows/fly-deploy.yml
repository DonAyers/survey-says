name: Deploy backend to Fly.io

# Vercel already auto-deploys the frontend on every push to main via its
# GitHub integration — this workflow only handles the Bun WS/game server
# (server.ts), which Vercel can't host (see DEPLOYMENT.md).
on:
  push:
    branches: [main]
    paths:
      - "server.ts"
      - "Dockerfile"
      - "fly.toml"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/fly-deploy.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    concurrency: deploy-group # only one deploy at a time
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
